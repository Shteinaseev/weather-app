<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Precipitation Map – WeatherAPI</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5n/N0aVIE=" crossorigin=""/>
  
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    body { margin: 0; padding: 0; }
    #map { height: 100vh; }
    .info-legend {
      background: rgba(255,255,255,0.85);
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
// Инициализация карты (центр на США, как у тебя на скрине)
const map = L.map('map').setView([38, -98], 5);

// Базовая карта (светлая, чтобы осадки хорошо были видны)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Слой осадков от WeatherAPI
// Важно: {0}{1} → это для выбора времени (00, 01, 02... до 72 часов вперёд)
const precipLayer = L.tileLayer('https://weathermaps.weatherapi.com/precip/tiles/00/{z}/{x}/{y}.png', {
  opacity: 0.75,           // полупрозрачный, как на большинстве погодных карт
  attribution: 'Weather tiles &copy; <a href="https://www.weatherapi.com/">WeatherAPI.com</a>',
  maxZoom: 10,
  minZoom: 3,
  bounds: [[-85, -180], [85, 180]]   // глобальные границы
}).addTo(map);


// Можно сделать переключатель времени (0–72 часа)
const times = [0, 3, 6, 12, 24];
const timeControl = L.control({position: 'topright'});

timeControl.onAdd = function () {
  const div = L.DomUtil.create('div', 'info-legend');
  div.innerHTML = '<h4>Осадки через:</h4>';

  times.forEach(hours => {
    const btn = L.DomUtil.create('button', '', div);
    btn.innerHTML = hours + ' ч';
    btn.style.margin = '4px';
    btn.onclick = () => {
      const timeStr = String(hours).padStart(2, '0');
      precipLayer.setUrl(`https://weathermaps.weatherapi.com/precip/tiles/${timeStr}/{z}/{x}/{y}.png`);
      // можно подсветить активную кнопку, но для простоты опустим
    };
  });

  return div;
};

timeControl.addTo(map);


// Легенда осадков (примерная, цвета примерно как у WeatherAPI)
const legend = L.control({position: 'bottomright'});

legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'info-legend');
  div.innerHTML += '<strong>Осадки</strong><br>';
  const grades = ['Слабые', 'Умеренные', 'Сильные', 'Экстремальные'];
  const colors = ['#00ffff', '#0000ff', '#800080', '#ff0000']; // примерные цвета

  for (let i = 0; i < grades.length; i++) {
    div.innerHTML +=
      '<i style="background:' + colors[i] + '; width:18px; height:18px; display:inline-block; margin-right:6px;"></i> ' +
      grades[i] + '<br>';
  }
  return div;
};

legend.addTo(map);

// Маркеры с температурой (как у тебя на скрине)
function addTempMarker(lat, lng, temp, precipProb = '') {
  const marker = L.marker([lat, lng], {
    icon: L.divIcon({
      className: 'temp-marker',
      html: `<div style="background:white; padding:4px 8px; border-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,0.4); font-weight:bold;">
               ${temp}°<br>${precipProb ? precipProb + '%' : ''}
             </div>`,
      iconSize: [60, 40],
      iconAnchor: [30, 20]
    })
  }).addTo(map);
}

// Примеры маркеров (можно получать через API)
addTempMarker(37.77, -122.42, 21, 90);  // San Francisco
addTempMarker(34.05, -118.24, 23);       // Los Angeles
addTempMarker(32.78, -96.80, 30);        // Dallas

</script>
</body>
</html>
